<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リアル川釣りゲーム</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(#87ceeb, #4da6ff);
}
#river {
  width: 420px;
  height: 260px;
  margin: 20px auto;
  background: radial-gradient(circle at 50% 30%, #3aa0ff, #1e6fd9);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  cursor: crosshair;
}
.float {
  width: 12px;
  height: 12px;
  background: red;
  border-radius: 50%;
  position: absolute;
  transition: top 0.2s;
}
.ripple {
  position: absolute;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  animation: ripple 1s ease-out;
}
@keyframes ripple {
  from { width: 0; height: 0; opacity: 1; }
  to { width: 60px; height: 60px; opacity: 0; }
}
.bubble {
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  position: absolute;
  opacity: 0.7;
}
#log {
  margin-top: 20px;
  height: 150px;
  overflow-y: auto;
  border: 1px solid #ccc;
  background: #fff;
  padding: 10px;
}
</style>
</head>
<body>

<h1>リアル川釣りゲーム</h1>
<p>クリックで投げる → ウキが沈んだ瞬間にスペース！</p>
<div id="river"></div>

<h2>釣果</h2>
<div id="log"></div>

<script>
const fishes = [
  { name: "フナ", stars: 1, rate: 0.5 },
  { name: "コイ", stars: 2, rate: 0.3 },
  { name: "ナマズ", stars: 3, rate: 0.15 },
  { name: "イトウ", stars: 4, rate: 0.05 }
];

const river = document.getElementById("river");
let floatEl = null;
let canCatch = false;
let active = false;

river.addEventListener("click", (e) => {
  river.innerHTML = "";
  active = true;
  canCatch = false;

  const rect = river.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // ripple
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = (x - 30) + "px";
  ripple.style.top = (y - 30) + "px";
  river.appendChild(ripple);

  // float
  floatEl = document.createElement("div");
  floatEl.className = "float";
  floatEl.style.left = x + "px";
  floatEl.style.top = y + "px";
  river.appendChild(floatEl);

  // bubbles swarm
  let bubbles = [];
  for (let i = 0; i < 5; i++) {
    const b = document.createElement("div");
    b.className = "bubble";
    b.x = Math.random() * 400;
    b.y = Math.random() * 240;
    b.style.left = b.x + "px";
    b.style.top = b.y + "px";
    river.appendChild(b);
    bubbles.push(b);
  }

  let t = 0;
  const move = setInterval(() => {
    t++;

    bubbles.forEach(b => {
      b.x += (x - b.x) * 0.03 + (Math.random() - 0.5) * 2;
      b.y += (y - b.y) * 0.03 + (Math.random() - 0.5) * 2;
      b.style.left = b.x + "px";
      b.style.top = b.y + "px";
    });

    // bite timing
    if (t > 60 && t < 120 && Math.random() < 0.05) {
      bite(x, y);
      clearInterval(move);
    }
  }, 30);
});

function bite(x, y) {
  if (!active) return;

  // small fake nibble first
  floatEl.style.top = (y + 4) + "px";

  setTimeout(() => {
    floatEl.style.top = (y + 14) + "px"; // deep sink
    canCatch = true;

    setTimeout(() => {
      if (canCatch) {
        addLog("…食い逃げされた！");
        canCatch = false;
      }
    }, 700);
  }, 400 + Math.random() * 800);
}

document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    if (!active) return;

    if (canCatch) {
      catchFish();
      canCatch = false;
      active = false;
    } else {
      addLog("早すぎ！タイミングが違う…");
    }
  }
});

function catchFish() {
  const rand = Math.random();
  let sum = 0;

  for (let f of fishes) {
    sum += f.rate;
    if (rand < sum) {
      addLog(`🎣 ${f.name}（★${f.stars}）を釣った！`);
      return;
    }
  }
}

function addLog(text) {
  const log = document.getElementById("log");
  const p = document.createElement("p");
  p.textContent = text;
  log.prepend(p);
}
</script>

</body>
</html>
