<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>川釣りゲーム</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(#87ceeb, #4da6ff);
}
#river {
  width: 300px;
  height: 200px;
  margin: 20px auto;
  background: #1e90ff;
  border-radius: 10px;
  position: relative;
}
#log {
  margin-top: 20px;
  height: 150px;
  overflow-y: auto;
  border: 1px solid #ccc;
  background: #fff;
  padding: 10px;
}
button {
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>
<body>

<h1>川釣りゲーム</h1>
<div id="river"></div>
<button onclick="fish()">釣る！</button>

<h2>釣果</h2>
<div id="log"></div>

<script>
const fishes = [
  { name: "フナ", stars: 1, rate: 0.5 },
  { name: "コイ", stars: 2, rate: 0.3 },
  { name: "ナマズ", stars: 3, rate: 0.15 },
  { name: "イトウ", stars: 4, rate: 0.05 }
];

function fish() {
  const rand = Math.random();
  let sum = 0;

  for (let f of fishes) {
    sum += f.rate;
    if (rand < sum) {
      addLog(`🎣 ${f.name}（★${f.stars}）を釣った！`);
      return;
    }
  }

  addLog("何も釣れなかった...");
}

function addLog(text) {
  const log = document.getElementById("log");
  const p = document.createElement("p");
  p.textContent = text;
  log.prepend(p);
}
</script>

</body>
</html>
